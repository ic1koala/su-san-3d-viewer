<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>すーさん 360° Viewer</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f7f3ee;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            touch-action: none; /* スワイプ時のスクロールを防止 */
        }
        h1 { color: #5d5d5d; margin-bottom: 20px; }
        
        /* 画像を表示する窓 */
        #viewer {
            width: 250px;
            height: 400px;
            border: 8px solid #fff;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            background-image: url('image.jpeg'); /* フォルダ内の画像名 */
            background-size: 500px 800px; /* 画像の並び(2x2)に合わせて調整 */
            background-repeat: no-repeat;
            cursor: grab;
        }
        #viewer:active { cursor: grabbing; }
        .instructions { margin-top: 20px; color: #888; font-size: 0.9em; }
    </style>
</head>
<body>

    <h1>Su-san Viewer</h1>
    
    <div id="viewer"></div>
    
    <p class="instructions">左右にドラッグして「すーさん」を回せます</p>

    <script>
        const viewer = document.getElementById('viewer');
        let isDragging = false;
        let startX = 0;
        let currentPos = 0;

        // 画像内の各向きの座標 (2x2の配置を想定)
        // [正面, 背面, 左側面, 右側面(左の反転想定)]
        const positions = [
            '0px 0px',      // 正面（上段左）
            '-250px 0px',   // 背面（上段右）
            '0px -400px',   // 正面（下段左）※予備
            '-250px -400px' // 左側面（下段右）
        ];

        let index = 0;

        function updateRotation(deltaX) {
            // 移動量に合わせて表示する画像（位置）を切り替える
            if (Math.abs(deltaX) > 50) {
                index = (index + (deltaX > 0 ? 1 : -1) + positions.length) % positions.length;
                viewer.style.backgroundPosition = positions[index];
                startX += deltaX; // 起点を更新して連続回転させる
            }
        }

        // マウス・タッチイベントの登録
        viewer.addEventListener('mousedown', (e) => { isDragging = true; startX = e.pageX; });
        window.addEventListener('mouseup', () => { isDragging = false; });
        window.addEventListener('mousemove', (e) => {
            if (isDragging) updateRotation(e.pageX - startX);
        });

        // スマホ用タッチイベント
        viewer.addEventListener('touchstart', (e) => { isDragging = true; startX = e.touches[0].pageX; });
        window.addEventListener('touchend', () => { isDragging = false; });
        window.addEventListener('touchmove', (e) => {
            if (isDragging) updateRotation(e.touches[0].pageX - startX);
        });
    </script>
</body>
</html>
